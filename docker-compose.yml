################################################################################
# AI Local Business Website Generator — Master Docker Compose
#
# Services (10 total):
#   postgres   — PostgreSQL 17 database
#   redis      — Redis 7 (Celery broker + result backend)
#   platform   — Next.js 15 admin dashboard + API
#   agents     — Python FastAPI (agent pipeline API)
#   worker     — Celery worker (background pipeline execution)
#   beat       — Celery Beat (scheduled tasks: nightly crawler)
#   flower     — Celery monitoring UI
#   nginx      — Reverse proxy (routes all traffic)
#   adminer    — PostgreSQL web admin
#   crawler    — One-shot crawler CLI (run manually via `make crawl`)
#
# Quick start:
#   cp .env.example .env
#   make up        # start everything
#   make logs      # follow logs
#   make crawl CITY=Warsaw CATEGORY=restaurant
#
# URLs (local):
#   http://localhost        — Platform (Next.js)
#   http://localhost:8001   — Agent API (FastAPI docs at /docs)
#   http://localhost:5556   — Flower (Celery monitor)
#   http://localhost:8082   — Adminer (DB admin)
################################################################################

name: ai-web-gen

x-common-env: &common-env
  TZ: Europe/Warsaw
  LANG: pl_PL.UTF-8

x-python-env: &python-env
  <<: *common-env
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  GROQ_API_KEY: ${GROQ_API_KEY}
  GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
  PAGESPEED_API_KEY: ${PAGESPEED_API_KEY}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aiwebgen}:${POSTGRES_PASSWORD:-securepass}@postgres:5432/${POSTGRES_DB:-ai_web_gen}
  REDIS_URL: redis://redis:6379/0
  PLATFORM_API_URL: http://platform:3000
  AGENT_API_SECRET: ${AGENT_API_SECRET:-dev-secret-change-me}
  DEMO_BASE_DOMAIN: ${DEMO_BASE_DOMAIN:-demo.yourplatform.pl}
  CF_ACCOUNT_ID: ${CF_ACCOUNT_ID:-}
  CF_R2_ACCESS_KEY: ${CF_R2_ACCESS_KEY:-}
  CF_R2_SECRET_KEY: ${CF_R2_SECRET_KEY:-}
  CF_R2_BUCKET: ${CF_R2_BUCKET:-demo-sites}
  PYTHONUNBUFFERED: "1"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 30s

services:
  # ───────────────────────────────────────────────────────────────────────────
  # INFRASTRUCTURE
  # ───────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:17-alpine
    container_name: aiwebgen-postgres
    restart: unless-stopped
    environment:
      <<: *common-env
      POSTGRES_USER: ${POSTGRES_USER:-aiwebgen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepass}
      POSTGRES_DB: ${POSTGRES_DB:-ai_web_gen}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiwebgen} -d ${POSTGRES_DB:-ai_web_gen}"]
      <<: *healthcheck-defaults
      start_period: 15s
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: aiwebgen-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *healthcheck-defaults
      start_period: 10s
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M

  # ───────────────────────────────────────────────────────────────────────────
  # APPLICATION SERVICES
  # ───────────────────────────────────────────────────────────────────────────

  platform:
    build:
      context: ./platform
      dockerfile: Dockerfile
      target: runner
    container_name: aiwebgen-platform
    restart: unless-stopped
    environment:
      <<: *common-env
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-aiwebgen}:${POSTGRES_PASSWORD:-securepass}@postgres:5432/${POSTGRES_DB:-ai_web_gen}
      REDIS_URL: redis://redis:6379/1
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER}
      STRIPE_PRICE_BUSINESS: ${STRIPE_PRICE_BUSINESS}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO}
      RESEND_API_KEY: ${RESEND_API_KEY}
      OUTREACH_FROM_EMAIL: ${OUTREACH_FROM_EMAIL:-demo@yourplatform.pl}
      OUTREACH_FROM_NAME: ${OUTREACH_FROM_NAME:-AI Web Generator}
      AGENT_API_URL: http://agents:8000
      AGENT_API_SECRET: ${AGENT_API_SECRET:-dev-secret-change-me}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
      DEMO_BASE_DOMAIN: ${DEMO_BASE_DOMAIN:-demo.yourplatform.pl}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      <<: *healthcheck-defaults
      start_period: 60s
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

  agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
      target: runner
    container_name: aiwebgen-agents
    restart: unless-stopped
    environment:
      <<: *python-env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      <<: *healthcheck-defaults
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 1G   # LLM calls can be memory-intensive

  worker:
    build:
      context: ./agents
      dockerfile: Dockerfile.worker
    container_name: aiwebgen-worker
    restart: unless-stopped
    environment:
      <<: *python-env
    command: >
      celery -A tasks worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=50
      -Q pipeline,crawler,email,default
      --hostname=worker@%h
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 2G   # Handles concurrent AI pipeline tasks

  beat:
    build:
      context: ./agents
      dockerfile: Dockerfile.worker
    container_name: aiwebgen-beat
    restart: unless-stopped
    environment:
      <<: *python-env
    command: >
      celery -A tasks beat
      --loglevel=info
      --scheduler=celery.beat:PersistentScheduler
      --schedule=/tmp/celerybeat-schedule
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M

  flower:
    build:
      context: ./agents
      dockerfile: Dockerfile.worker
    container_name: aiwebgen-flower
    restart: unless-stopped
    environment:
      <<: *python-env
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-flowerpass}
    command: >
      celery -A tasks flower
      --port=5555
      --broker_api=redis://redis:6379/0
      --persistent=True
      --db=/tmp/flower.db
      --max_tasks=10000
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "5555"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 256M

  # ───────────────────────────────────────────────────────────────────────────
  # REVERSE PROXY
  # ───────────────────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.27-alpine
    container_name: aiwebgen-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "8001:8001"
      - "5556:5556"
      - "8082:8082"
    depends_on:
      platform:
        condition: service_healthy
      agents:
        condition: service_healthy
      flower:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 64M

  # ───────────────────────────────────────────────────────────────────────────
  # DEVELOPER TOOLS
  # ───────────────────────────────────────────────────────────────────────────

  adminer:
    image: adminer:4-standalone
    container_name: aiwebgen-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 64M

  # ───────────────────────────────────────────────────────────────────────────
  # ONE-SHOT HELPERS (run via `docker compose run`)
  # ───────────────────────────────────────────────────────────────────────────

  db-migrate:
    build:
      context: ./platform
      dockerfile: Dockerfile
      target: builder
    container_name: aiwebgen-db-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aiwebgen}:${POSTGRES_PASSWORD:-securepass}@postgres:5432/${POSTGRES_DB:-ai_web_gen}
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        until npx prisma db push --skip-generate 2>&1; do
          echo 'DB not ready, retrying in 3s...'
          sleep 3
        done &&
        echo 'Database schema applied!' &&
        npx prisma db seed || echo 'Seed already done or skipped'
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: "no"

  crawler:
    build:
      context: ./agents
      dockerfile: Dockerfile
      target: runner
    container_name: aiwebgen-crawler
    environment:
      <<: *python-env
    command: >
      python crawler/discover.py discover
      --city ${CRAWL_CITY:-Warsaw}
      --category ${CRAWL_CATEGORY:-restaurant}
      --source ${CRAWL_SOURCE:-both}
      --limit ${CRAWL_LIMIT:-200}
      --output /tmp/discovered.jsonl
    profiles:
      - tools
    networks:
      - backend
    restart: "no"

# ─────────────────────────────────────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────────────────────────────────────────
networks:
  frontend:
    driver: bridge
    name: aiwebgen-frontend
  backend:
    driver: bridge
    name: aiwebgen-backend
    internal: true   # no direct external access to backend services
