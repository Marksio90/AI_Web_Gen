################################################################################
# AI Local Business Website Generator — Master Docker Compose
#
# ✅ FIXED: Network isolation (worker/beat → platform communication)
# ✅ FIXED: Build context → repo root (agents+crawler in same image)
# ✅ FIXED: npm ci → graceful lockfile handling
# ✅ FIXED: Explicit network assignments for every service
# ✅ ADDED: Full observability (Prometheus + Grafana + Loki + Promtail)
# ✅ ADDED: Exporters (postgres, redis, nginx, node)
# ✅ ADDED: Proper restart policies and resource limits
#
# Quick start:
#   cp .env.example .env && make setup
#   make up       → dev stack (hot reload)
#   make health   → verify all services
#
# Local URLs:
#   http://localhost         → Platform (Next.js dashboard)
#   http://localhost:8001    → Agent API + Swagger UI /docs
#   http://localhost:5556    → Flower (Celery monitor)
#   http://localhost:8082    → Adminer (DB admin)
#   http://localhost:3001    → Grafana (metrics dashboards)
#   http://localhost:9090    → Prometheus (raw metrics)
################################################################################

name: ai-web-gen

# ─── Reusable anchors ─────────────────────────────────────────────────────────
x-common-env: &common-env
  TZ: Europe/Warsaw

x-python-env: &python-env
  <<: *common-env
  OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY required}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
  PAGESPEED_API_KEY: ${PAGESPEED_API_KEY:-}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aiwebgen}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/${POSTGRES_DB:-ai_web_gen}
  REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
  PLATFORM_API_URL: http://platform:3000
  AGENT_API_SECRET: ${AGENT_API_SECRET:-dev-secret-change-in-prod}
  DEMO_BASE_DOMAIN: ${DEMO_BASE_DOMAIN:-demo.yourplatform.pl}
  CF_ACCOUNT_ID: ${CF_ACCOUNT_ID:-}
  CF_R2_ACCESS_KEY: ${CF_R2_ACCESS_KEY:-}
  CF_R2_SECRET_KEY: ${CF_R2_SECRET_KEY:-}
  CF_R2_BUCKET: ${CF_R2_BUCKET:-demo-sites}
  PEXELS_API_KEY: ${PEXELS_API_KEY:-}
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: /app

x-healthcheck-fast: &healthcheck-fast
  interval: 15s
  timeout: 8s
  retries: 5
  start_period: 20s

x-healthcheck-slow: &healthcheck-slow
  interval: 30s
  timeout: 15s
  retries: 5
  start_period: 60s

x-logging: &logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"
    labels: "service"

services:
  ############################################################################
  # INFRASTRUCTURE
  ############################################################################

  postgres:
    image: postgres:17-alpine
    container_name: aiwebgen-postgres
    restart: unless-stopped
    environment:
      <<: *common-env
      POSTGRES_USER: ${POSTGRES_USER:-aiwebgen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-ai_web_gen}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiwebgen} -d ${POSTGRES_DB:-ai_web_gen}"]
      <<: *healthcheck-fast
      start_period: 15s
    networks:
      - backend
    logging: *logging
    labels:
      com.docker.compose.description: "PostgreSQL 17 database"
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: aiwebgen-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
      --appendfsync everysec
      --loglevel warning
      --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      <<: *healthcheck-fast
      start_period: 5s
    networks:
      - backend
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 320M

  ############################################################################
  # ONE-SHOT: Database migration (runs before platform starts)
  ############################################################################

  db-migrate:
    build:
      context: ./platform
      dockerfile: Dockerfile
      target: builder
    container_name: aiwebgen-db-migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-aiwebgen}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/${POSTGRES_DB:-ai_web_gen}
      NODE_ENV: production
    command: >
      sh -c "
        echo '🔄 Running database migrations...' &&
        until npx prisma db push --skip-generate; do
          echo '⏳ DB not ready, retrying in 3s...' && sleep 3;
        done &&
        echo '✅ Schema applied!' &&
        npx prisma db seed 2>&1 | grep -v 'already exists' || true &&
        echo '✅ Seed complete!'
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    logging: *logging

  ############################################################################
  # APPLICATION SERVICES
  ############################################################################

  platform:
    build:
      context: ./platform
      dockerfile: Dockerfile
      target: runner
    container_name: aiwebgen-platform
    restart: unless-stopped
    environment:
      <<: *common-env
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-aiwebgen}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/${POSTGRES_DB:-ai_web_gen}
      AUTH_SECRET: ${AUTH_SECRET:-insecure-dev-secret-change-me}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-price_placeholder}
      STRIPE_PRICE_BUSINESS: ${STRIPE_PRICE_BUSINESS:-price_placeholder}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-price_placeholder}
      RESEND_API_KEY: ${RESEND_API_KEY:-re_placeholder}
      OUTREACH_FROM_EMAIL: ${OUTREACH_FROM_EMAIL:-demo@yourplatform.pl}
      OUTREACH_FROM_NAME: ${OUTREACH_FROM_NAME:-AI Web Generator}
      AGENT_API_URL: http://agents:8000
      AGENT_API_SECRET: ${AGENT_API_SECRET:-dev-secret-change-in-prod}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
      DEMO_BASE_DOMAIN: ${DEMO_BASE_DOMAIN:-demo.yourplatform.pl}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      <<: *healthcheck-slow
      start_period: 60s
    networks:
      - frontend
      - backend      # needs DB + Redis
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 512M

  agents:
    build:
      context: .              # ← repo root (copies agents/ + crawler/)
      dockerfile: agents/Dockerfile
      target: runner
    container_name: aiwebgen-agents
    restart: unless-stopped
    environment:
      <<: *python-env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      <<: *healthcheck-slow
    networks:
      - frontend     # nginx routes to agents
      - backend      # needs Redis + Postgres
      - internal     # isolated internal comms
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 1G

  worker:
    build:
      context: .              # ← repo root
      dockerfile: agents/Dockerfile.worker
      target: runner
    container_name: aiwebgen-worker
    restart: unless-stopped
    environment:
      <<: *python-env
    command: >
      celery -A tasks worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=100
      -Q pipeline,crawler,email,default
      --hostname=worker@%h
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      platform:
        condition: service_started   # needs platform API for task callbacks
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks inspect ping -d celery@$$HOSTNAME --timeout 10 -q 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 90s
    networks:
      - backend      # Redis + Postgres
      - frontend     # ← CRITICAL: needs to call platform:3000 API
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 2G

  beat:
    build:
      context: .              # ← repo root
      dockerfile: agents/Dockerfile.worker
      target: runner
    container_name: aiwebgen-beat
    restart: unless-stopped
    environment:
      <<: *python-env
    command: >
      celery -A tasks beat
      --loglevel=info
      --scheduler=celery.beat:PersistentScheduler
      --schedule=/tmp/celerybeat-schedule
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    networks:
      - backend
      - frontend     # ← CRITICAL: calls platform:3000 for crawler ingestion
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 128M

  flower:
    build:
      context: .
      dockerfile: agents/Dockerfile.worker
      target: runner
    container_name: aiwebgen-flower
    restart: unless-stopped
    environment:
      <<: *python-env
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-flowerpass}
    command: >
      celery -A tasks flower
      --port=5555
      --persistent=True
      --db=/tmp/flower.db
      --max_tasks=10000
      --enable_events
      --natural_time=True
      --prometheus
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "5555"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5555/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - frontend
      - backend
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 256M

  ############################################################################
  # REVERSE PROXY
  ############################################################################

  nginx:
    image: nginx:1.27-alpine
    container_name: aiwebgen-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${HTTP_PORT:-80}:80"
      - "8001:8001"
      - "5556:5556"
      - "8082:8082"
    depends_on:
      platform:
        condition: service_healthy
      agents:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -fsS http://localhost/api/health > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - frontend
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 64M

  ############################################################################
  # OBSERVABILITY STACK
  ############################################################################

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: aiwebgen-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    expose:
      - "9093"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 128M

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: aiwebgen-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--log.level=warn'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - monitoring
      - frontend     # scrapes platform, agents, nginx
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9090/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:11.0.0
    container_name: aiwebgen-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafanapass}
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_LOG_LEVEL: warn
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 256M

  loki:
    image: grafana/loki:3.0.0
    container_name: aiwebgen-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    expose:
      - "3100"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 512M

  promtail:
    image: grafana/promtail:3.0.0
    container_name: aiwebgen-promtail
    restart: unless-stopped
    profiles:
      - linux          # requires /var/run/docker.sock and /var/log — Linux only
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
      - promtail_positions:/positions
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - monitoring
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 128M

  # Metrics exporters
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: aiwebgen-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-aiwebgen}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/${POSTGRES_DB:-ai_web_gen}?sslmode=disable
    expose:
      - "9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
      - monitoring
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 128M

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: aiwebgen-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
    expose:
      - "9121"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - backend
      - monitoring
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 128M

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: aiwebgen-nginx-exporter
    restart: unless-stopped
    command:
      - '--nginx.scrape-uri=http://nginx:8090/stub_status'
    expose:
      - "9113"
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - frontend
      - monitoring
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 128M

  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: aiwebgen-node-exporter
    restart: unless-stopped
    profiles:
      - linux          # requires host /proc, /sys, / mounts — Linux only
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--web.listen-address=:9100'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    expose:
      - "9100"
    networks:
      - monitoring
    pid: host
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 128M

  ############################################################################
  # DEVELOPER TOOLS
  ############################################################################

  adminer:
    image: adminer:4-standalone
    container_name: aiwebgen-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          memory: 64M

  ############################################################################
  # ONE-SHOT: Crawler (run via `make crawl` or `docker compose run crawler`)
  ############################################################################

  crawler:
    build:
      context: .
      dockerfile: agents/Dockerfile
      target: runner
    container_name: aiwebgen-crawler
    environment:
      <<: *python-env
    command: >
      python crawler/discover.py discover
      --city ${CRAWL_CITY:-Warsaw}
      --category ${CRAWL_CATEGORY:-restaurant}
      --source ${CRAWL_SOURCE:-both}
      --limit ${CRAWL_LIMIT:-200}
      --output /tmp/discovered.jsonl
    profiles:
      - tools
    networks:
      - backend
      - frontend
    restart: "no"

############################################################################
# VOLUMES
############################################################################
volumes:
  postgres_data:
    driver: local
    labels:
      com.ai-web-gen.description: "PostgreSQL database storage"
  redis_data:
    driver: local
    labels:
      com.ai-web-gen.description: "Redis persistence"
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  alertmanager_data:
    driver: local
  promtail_positions:
    driver: local

############################################################################
# NETWORKS
############################################################################
networks:
  frontend:
    name: aiwebgen-frontend
    driver: bridge

  backend:
    name: aiwebgen-backend
    driver: bridge
    # NOTE: NOT internal — worker/beat need egress to platform:3000

  internal:
    name: aiwebgen-internal
    driver: bridge
    internal: true   # truly isolated inter-agent comms

  monitoring:
    name: aiwebgen-monitoring
    driver: bridge
