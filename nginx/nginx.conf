################################################################################
# Nginx — Reverse Proxy for AI Web Generator
#
# Routes:
#   yourplatform.pl         →  platform:3000  (Next.js)
#   api.yourplatform.pl     →  agents:8000    (FastAPI)
#   flower.yourplatform.pl  →  flower:5555    (Celery Monitor)
#   adminer.yourplatform.pl →  adminer:8080   (DB Admin)
#
# In local Docker: all services accessible via http://localhost
################################################################################

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main buffer=16k;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 75;
    keepalive_requests 100;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss text/javascript image/svg+xml;

    # Buffer overflow protection
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "0" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; frame-src https://js.stripe.com; connect-src 'self' https://api.stripe.com;" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    server_tokens off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Upstreams
    upstream platform {
        server platform:3000;
        keepalive 32;
    }

    upstream agents_api {
        server agents:8000;
        keepalive 16;
    }

    upstream flower_ui {
        server flower:5555;
    }

    upstream adminer_ui {
        server adminer:8080;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Main platform — Next.js
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost yourplatform.pl www.yourplatform.pl _;

        client_max_body_size 10M;
        limit_conn addr 20;

        # Static assets — aggressive caching
        location /_next/static/ {
            proxy_pass http://platform;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Webhook — no rate limit (Stripe needs reliable delivery)
        location /api/webhooks/ {
            proxy_pass http://platform;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # API routes — moderate rate limit
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://platform;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;   # Agent pipeline can take ~60s
        }

        # Everything else
        location / {
            limit_req zone=general burst=30 nodelay;
            proxy_pass http://platform;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # FastAPI agent service — port 8001
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 8001;
        server_name _;

        client_max_body_size 5M;

        location /health {
            proxy_pass http://agents_api;
            access_log off;
        }

        location / {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://agents_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 360s;   # Batch pipeline can take up to 5 min
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Flower — Celery monitoring — port 5555
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 5556;
        server_name _;

        # Protect with basic auth in production
        # auth_basic "Celery Monitor";
        # auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://flower_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Adminer — DB admin — port 8080
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 8082;
        server_name _;

        # Restrict to local/private networks
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        location / {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://adminer_ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Stub status — for nginx-prometheus-exporter (internal only)
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 8090;
        server_name _;
        access_log off;

        location /stub_status {
            stub_status;
            allow 172.16.0.0/12;   # Docker networks
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
        }
    }
}
