################################################################################
# Development overrides — hot reload, debug tools, relaxed resource limits
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
################################################################################

services:
  platform:
    build:
      context: ./platform
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
    volumes:
      - ./platform/src:/app/src
      - ./platform/prisma:/app/prisma
      - ./platform/public:/app/public
    ports:
      - "3000:3000"

  agents:
    build:
      target: runner
    environment:
      LOG_LEVEL: DEBUG
    volumes:
      - ./agents:/app/agents
      - ./crawler:/app/crawler
    ports:
      - "8000:8000"

  worker:
    build:
      target: runner
    environment:
      LOG_LEVEL: DEBUG
    volumes:
      - ./agents:/app/agents
      - ./crawler:/app/crawler
    command: >
      celery -A tasks worker
      --loglevel=debug
      --concurrency=2
      -Q pipeline,crawler,email,default
      --hostname=worker@%h

  # MailCatcher — catches outgoing emails in development
  mailcatcher:
    image: sj26/mailcatcher:latest
    container_name: aiwebgen-mailcatcher
    restart: unless-stopped
    ports:
      - "8025:1080"   # Web UI
      - "1025:1025"   # SMTP
    networks:
      - frontend
      - backend

  # Redis Commander — visual Redis browser
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: aiwebgen-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8083:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
