################################################################################
# Development overrides — applied on top of docker-compose.yml
# Usage: make dev  (or: docker compose -f docker-compose.yml -f docker-compose.dev.yml up)
#
# Key changes vs production:
#   ✅ Hot reload: Next.js (next dev) + FastAPI (--reload)
#   ✅ Source code mounted as volumes for instant feedback
#   ✅ All ports exposed for direct local access
#   ✅ Extra dev tools: Redis Commander + Mailpit email catcher
#   ✅ Relaxed resource limits for dev machines
#   ✅ Prometheus + Grafana + Loki ports exposed
################################################################################

services:
  # ── Platform (Next.js) ───────────────────────────────────────────────────
  platform:
    build:
      context: ./platform
      dockerfile: Dockerfile.dev   # lighter image, skips standalone build
    environment:
      NODE_ENV: development
    volumes:
      - ./platform/src:/app/src:delegated
      - ./platform/public:/app/public:delegated
      - ./platform/prisma:/app/prisma:delegated
      - platform_nodemodules:/app/node_modules   # isolated — don't override from host
    ports:
      - "3000:3000"   # direct access (bypasses nginx)
    command: npm run dev
    deploy:
      resources:
        limits:
          memory: 1G   # Next.js dev mode uses more RAM

  # ── Agents (FastAPI) ─────────────────────────────────────────────────────
  agents:
    build:
      context: .
      dockerfile: agents/Dockerfile
      target: runner
    volumes:
      - ./agents:/app:delegated          # hot reload via --reload
      - ./crawler:/app/crawler:delegated # crawler is imported by tasks.py
    ports:
      - "8000:8000"   # direct Swagger UI access
    environment:
      ENV: development
    command: >
      uvicorn api_server:app
      --host 0.0.0.0 --port 8000
      --reload --reload-dir /app
      --log-level debug
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Celery Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: agents/Dockerfile.worker
      target: runner
    volumes:
      - ./agents:/app:delegated
      - ./crawler:/app/crawler:delegated
    command: >
      celery -A tasks worker
      --loglevel=debug
      --concurrency=2
      -Q pipeline,crawler,email,default
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Celery Beat ──────────────────────────────────────────────────────────
  beat:
    volumes:
      - ./agents:/app:delegated
      - ./crawler:/app/crawler:delegated

  # ── Flower ───────────────────────────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: agents/Dockerfile.worker
      target: runner
    volumes:
      - ./agents:/app:delegated
    ports:
      - "5555:5555"   # direct access (also via nginx on :5556)

  # ── Nginx ────────────────────────────────────────────────────────────────
  nginx:
    ports:
      - "80:80"
      - "8001:8001"
      - "5556:5556"
      - "8082:8082"

  # ── Database & Cache ─────────────────────────────────────────────────────
  postgres:
    ports:
      - "5432:5432"    # direct DB access from host (pgAdmin, DBeaver, etc.)
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    ports:
      - "6379:6379"    # direct Redis access
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Monitoring (expose for local access) ─────────────────────────────────
  prometheus:
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"

  loki:
    ports:
      - "3100:3100"

  # ── Extra Dev Tools ───────────────────────────────────────────────────────

  # Redis Commander — visual Redis queue inspector
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: aiwebgen-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "Celery Broker:redis:6379:0,Celery Results:redis:6379:1"
      HTTP_USER: admin
      HTTP_PASSWORD: admin
    ports:
      - "8083:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend

  # Mailpit — catches all emails sent in dev (no real emails go out)
  mailpit:
    image: axllent/mailpit:latest
    container_name: aiwebgen-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP (point Resend to localhost:1025 in dev)
      - "8025:8025"   # Web UI: http://localhost:8025
    networks:
      - backend

volumes:
  platform_nodemodules:   # isolated node_modules for hot reload
    driver: local
