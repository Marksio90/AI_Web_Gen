groups:
  - name: ai_web_gen_alerts
    interval: 30s
    rules:
      # Platform down
      - alert: PlatformDown
        expr: up{job="platform"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Platform (Next.js) is down"
          description: "Platform has been unreachable for more than 2 minutes."

      # Agent API down
      - alert: AgentAPIDown
        expr: up{job="agents"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Agent API (FastAPI) is down"

      # High memory usage
      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage (>90%)"

      # PostgreSQL connections near limit
      - alert: PostgreSQLConnectionsHigh
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections above 80"

      # Redis memory high
      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage above 85%"

      # Celery queue backlog
      - alert: CeleryQueueBacklog
        expr: celery_queue_length{queue="pipeline"} > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pipeline queue has >100 pending tasks"

      # High error rate on Agent API
      - alert: AgentHighErrorRate
        expr: rate(http_requests_total{job="agents",status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Agent API error rate above 10%"
