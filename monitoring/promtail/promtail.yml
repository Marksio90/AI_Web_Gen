server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: label
            values: ["com.docker.compose.project=ai-web-gen"]
    relabel_configs:
      # Use container name as service label
      - source_labels: [__meta_docker_container_name]
        regex: '/aiwebgen-(.*)'
        target_label: service
      # Drop noisy containers
      - source_labels: [service]
        regex: 'nginx-exporter|node-exporter|postgres-exporter|redis-exporter'
        action: drop
      # Add compose project label
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project
    pipeline_stages:
      # Parse JSON logs (Python structlog + Next.js)
      - json:
          expressions:
            level: level
            msg: msg
            timestamp: timestamp
            service: service
      - labels:
          level:
          service:
      - timestamp:
          source: timestamp
          format: RFC3339
      # Drop health check noise
      - drop:
          expression: '.*(GET /api/health|GET /health).*'
          drop_counter_reason: health_check
