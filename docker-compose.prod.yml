################################################################################
# Production overrides — TLS via Traefik, stricter limits, no debug tools
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
################################################################################

services:
  # Replace nginx with Traefik for automatic TLS
  nginx:
    profiles:
      - disabled  # Disable stock nginx in production

  traefik:
    image: traefik:v3.1
    container_name: aiwebgen-traefik
    restart: unless-stopped
    command:
      - '--api.dashboard=false'
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--providers.docker.network=aiwebgen-frontend'
      - '--entrypoints.web.address=:80'
      - '--entrypoints.web.http.redirections.entrypoint.to=websecure'
      - '--entrypoints.websecure.address=:443'
      - '--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web'
      - '--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@yourplatform.pl}'
      - '--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json'
      - '--log.level=WARN'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 128M

  platform:
    labels:
      traefik.enable: "true"
      traefik.http.routers.platform.rule: "Host(`${DOMAIN:-yourplatform.pl}`) || Host(`www.${DOMAIN:-yourplatform.pl}`)"
      traefik.http.routers.platform.entrypoints: "websecure"
      traefik.http.routers.platform.tls.certresolver: "letsencrypt"
      traefik.http.services.platform.loadbalancer.server.port: "3000"
    deploy:
      resources:
        limits:
          memory: 768M
      replicas: 2

  agents:
    labels:
      traefik.enable: "true"
      traefik.http.routers.agents.rule: "Host(`api.${DOMAIN:-yourplatform.pl}`)"
      traefik.http.routers.agents.entrypoints: "websecure"
      traefik.http.routers.agents.tls.certresolver: "letsencrypt"
      traefik.http.services.agents.loadbalancer.server.port: "8000"
    deploy:
      resources:
        limits:
          memory: 1536M

  worker:
    command: >
      celery -A tasks worker
      --loglevel=warning
      --concurrency=8
      --max-tasks-per-child=50
      -Q pipeline,crawler,email,default
      --hostname=worker@%h
    deploy:
      resources:
        limits:
          memory: 3G

  flower:
    labels:
      traefik.enable: "true"
      traefik.http.routers.flower.rule: "Host(`flower.${DOMAIN:-yourplatform.pl}`)"
      traefik.http.routers.flower.entrypoints: "websecure"
      traefik.http.routers.flower.tls.certresolver: "letsencrypt"
      traefik.http.services.flower.loadbalancer.server.port: "5555"

  # Disable dev tools in production
  adminer:
    profiles:
      - disabled

volumes:
  traefik_certs:
    driver: local
