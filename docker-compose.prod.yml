################################################################################
# Production overrides — applied on top of docker-compose.yml
# Usage: make prod  (or: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d)
#
# Key changes vs dev:
#   ✅ Traefik reverse proxy with auto Let's Encrypt TLS
#   ✅ All direct port bindings removed (only Traefik handles :80/:443)
#   ✅ Service replicas: platform×2, agents×2, worker×2
#   ✅ Stricter resource limits
#   ✅ Always-restart policy
#   ✅ Monitoring protected by basic auth
################################################################################

services:
  # ── Traefik — Auto TLS ───────────────────────────────────────────────────
  traefik:
    image: traefik:v3.3
    container_name: aiwebgen-traefik
    restart: always
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL:?ACME_EMAIL required for prod}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addServicesLabels=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    networks:
      - frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN:?DOMAIN required}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=le"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_BASIC_AUTH}"

  # ── Platform ─────────────────────────────────────────────────────────────
  platform:
    restart: always
    ports: !reset []   # remove all ports — Traefik handles
    labels:
      - "traefik.enable=true"
      # Main site
      - "traefik.http.routers.platform.rule=Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)"
      - "traefik.http.routers.platform.entrypoints=websecure"
      - "traefik.http.routers.platform.tls.certresolver=le"
      - "traefik.http.services.platform.loadbalancer.server.port=3000"
      - "traefik.http.routers.platform.middlewares=security-headers"
      # Security headers middleware
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.security-headers.headers.forceSTSHeader=true"
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ── Agents ───────────────────────────────────────────────────────────────
  agents:
    restart: always
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agents.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.agents.entrypoints=websecure"
      - "traefik.http.routers.agents.tls.certresolver=le"
      - "traefik.http.services.agents.loadbalancer.server.port=8000"
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ── Worker (scale out for throughput) ────────────────────────────────────
  worker:
    restart: always
    deploy:
      replicas: 2   # 2 workers × 4 concurrency = 8 simultaneous pipelines
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ── Beat (only ONE instance — multiple would double-schedule) ─────────────
  beat:
    restart: always
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 128M

  # ── Flower ───────────────────────────────────────────────────────────────
  flower:
    restart: always
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flower.rule=Host(`flower.${DOMAIN}`)"
      - "traefik.http.routers.flower.entrypoints=websecure"
      - "traefik.http.routers.flower.tls.certresolver=le"
      - "traefik.http.services.flower.loadbalancer.server.port=5555"
      - "traefik.http.routers.flower.middlewares=flower-auth"
      - "traefik.http.middlewares.flower-auth.basicauth.users=${FLOWER_BASIC_AUTH_TRAEFIK}"

  # ── Nginx (internal only in prod — Traefik handles external) ─────────────
  nginx:
    ports: !reset []
    expose:
      - "80"

  # ── Database (no direct port in prod) ────────────────────────────────────
  postgres:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Grafana (protected in prod) ───────────────────────────────────────────
  grafana:
    restart: always
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=le"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    networks:
      - frontend
      - monitoring

  # ── Prometheus (internal only in prod) ────────────────────────────────────
  prometheus:
    restart: always
    ports: !reset []

  # ── Adminer disabled in prod ──────────────────────────────────────────────
  adminer:
    profiles:
      - disabled

volumes:
  traefik_certs:
    driver: local
